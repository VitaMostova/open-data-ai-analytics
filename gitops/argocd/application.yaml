apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: vita-analytics-gitops
  namespace: argocd
spec:
  project: default
  source:

    repoURL: https://github.com/VitaMostova/open-data-ai-analytics.git
    targetRevision: gitops
    path: gitops/app
  destination:
    server: https://kubernetes.default.svc
    namespace: vitas-app
  syncPolicy:
    automated:
      prune: true
      selfHeal: true