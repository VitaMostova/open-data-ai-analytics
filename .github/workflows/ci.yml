name: CI (modules)

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
  workflow_dispatch:
    inputs:
      module:
        description: "Оберіть модуль для запуску (або all)"
        required: true
        default: "all"
        type: choice
        options: [all, data_load, data_quality_analysis, data_research, visualization]

jobs:
  run-modules:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:

        module: [data_load, data_quality_analysis, data_research, visualization]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0


      - name: Check for changes in module
        id: changed-files
        uses: tj-actions/changed-files@v42
        with:
          files: src/${{ matrix.module }}.py

      - name: Set up Python

        if: |
          github.ref == 'refs/heads/main' ||
          steps.changed-files.outputs.any_changed == 'true' ||
          (github.event_name == 'workflow_dispatch' && (github.event.inputs.module == 'all' || github.event.inputs.module == matrix.module))
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: 'pip'

      - name: Install dependencies
        if: |
          github.ref == 'refs/heads/main' ||
          steps.changed-files.outputs.any_changed == 'true' ||
          (github.event_name == 'workflow_dispatch' && (github.event.inputs.module == 'all' || github.event.inputs.module == matrix.module))
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run module
        if: |
          github.ref == 'refs/heads/main' ||
          steps.changed-files.outputs.any_changed == 'true' ||
          (github.event_name == 'workflow_dispatch' && (github.event.inputs.module == 'all' || github.event.inputs.module == matrix.module))
        run: |
          mkdir -p artifacts/${{ matrix.module }}
          echo "Запуск модуля ${{ matrix.module }}..."
          python src/${{ matrix.module }}.py > artifacts/${{ matrix.module }}/run.log 2>&1
          cp -r reports/* artifacts/${{ matrix.module }}/ 2>/dev/null || true

      - name: Create HTML report for Pages
        if: |
          github.ref == 'refs/heads/main' ||
          steps.changed-files.outputs.any_changed == 'true' ||
          (github.event_name == 'workflow_dispatch' && (github.event.inputs.module == 'all' || github.event.inputs.module == matrix.module))
        run: |
       
          echo "<html><body><h1>Results for ${{ matrix.module }}</h1>" > artifacts/${{ matrix.module }}/index.html
          echo "<p>Build: $(date)</p><a href='run.log'>Technical Log</a><br>" >> artifacts/${{ matrix.module }}/index.html
     
          for f in artifacts/${{ matrix.module }}/*; do
            fname=$(basename $f)
            if [ "$fname" != "index.html" ]; then
              echo "<br><a href='$fname'>$fname</a>" >> artifacts/${{ matrix.module }}/index.html
            fi
          done
          echo "</body></html>" >> artifacts/${{ matrix.module }}/index.html
      - name: Upload artifacts
        if: |
          github.ref == 'refs/heads/main' ||
          steps.changed-files.outputs.any_changed == 'true' ||
          (github.event_name == 'workflow_dispatch' && (github.event.inputs.module == 'all' || github.event.inputs.module == matrix.module))
        uses: actions/upload-artifact@v4
        with:
          name: artifacts-${{ matrix.module }}
          path: artifacts/${{ matrix.module }}/
         

  deploy-pages:
    needs: run-modules
    if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download all artifact
        uses: actions/download-artifact@v4
        with:
          path: temp_dir/

      - name: Prepare public folder
        run: |
          mkdir -p public
          cp -r temp_dir/*/* public/ 2>/dev/null || true
          echo "<html><body><h1>Project Reports</h1><ul>" > public/index.html
          for d in public/*; do
            if [ -d "$d" ]; then
              name=$(basename $d)
              echo "<li><a href='./$name/index.html'>$name</a></li>" >> public/index.html
            fi
          done
          echo "</ul></body></html>" >> public/index.html

      - name: Deploy to GitHub Pages
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: public/
          branch: gh-pages
