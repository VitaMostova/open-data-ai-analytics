name: CI (modules)

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
  workflow_dispatch:
    inputs:
      module:
        description: "Оберіть модуль для запуску (або all)"
        required: true
        default: "all"
        type: choice
        options: [all, data_load, data_quality_analysis, data_research, visualization]

jobs:
  run-modules:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:

        module: [data_load, data_quality_analysis, data_research, visualization]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0


      - name: Check for changes in module
        id: changed-files
        uses: tj-actions/changed-files@v42
        with:
          files: src/${{ matrix.module }}.py

      - name: Set up Python

        if: |
          github.ref == 'refs/heads/main' ||
          steps.changed-files.outputs.any_changed == 'true' ||
          (github.event_name == 'workflow_dispatch' && (github.event.inputs.module == 'all' || github.event.inputs.module == matrix.module))
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: 'pip'

      - name: Install dependencies
        if: |
          github.ref == 'refs/heads/main' ||
          steps.changed-files.outputs.any_changed == 'true' ||
          (github.event_name == 'workflow_dispatch' && (github.event.inputs.module == 'all' || github.event.inputs.module == matrix.module))
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run module
        if: |
          github.ref == 'refs/heads/main' ||
          steps.changed-files.outputs.any_changed == 'true' ||
          (github.event_name == 'workflow_dispatch' && (github.event.inputs.module == 'all' || github.event.inputs.module == matrix.module))
        run: |
          mkdir -p artifacts/${{ matrix.module }}
          echo "Запуск модуля ${{ matrix.module }}..."
          python src/${{ matrix.module }}.py > artifacts/${{ matrix.module }}/run.log 2>&1
          cp -r reports/* artifacts/${{ matrix.module }}/ 2>/dev/null || true

      - name: Create HTML report for Pages
        
        if: |
          github.ref == 'refs/heads/main' ||
          steps.changed-files.outputs.any_changed == 'true' ||
          (github.event_name == 'workflow_dispatch' && (github.event.inputs.module == 'all' || github.event.inputs.module == matrix.module))
        run: |
          
          REPORT_FILE="artifacts/${{ matrix.module }}/index.html"
          echo "<html><body style='font-family:sans-serif;padding:20px;'><h1>Results: ${{ matrix.module }}</h1>" > $REPORT_FILE
          echo "<p>BUILD DATE: $(date)</p><hr>" >> $REPORT_FILE

          
          if [ -f "artifacts/${{ matrix.module }}/data_quality_report.md" ]; then
            echo "<h3> Data Quality Report:</h3>" >> $REPORT_FILE
            echo "<p><a href='data_quality_report.md' target='_blank'>Відкрити звіт (Markdown)</a></p>" >> $REPORT_FILE
          fi

          
          if [ -d "artifacts/${{ matrix.module }}/figures" ]; then
            echo "<h3>📊 Visualizations:</h3>" >> $REPORT_FILE
            for img in artifacts/${{ matrix.module }}/figures/*.png; do
              if [ -f "$img" ]; then
                fname=$(basename "$img")
                echo "<div><p>$fname</p><img src='figures/$fname' width='600' style='border:1px solid #ddd; margin-bottom:20px;'></div>" >> $REPORT_FILE
              fi
            done
          fi

          echo "<hr><p><a href='run.log'>Технічний лог (run.log)</a></p>" >> $REPORT_FILE
          echo "</body></html>" >> $REPORT_FILE
      - name: Upload artifacts
        if: |
          github.ref == 'refs/heads/main' ||
          steps.changed-files.outputs.any_changed == 'true' ||
          (github.event_name == 'workflow_dispatch' && (github.event.inputs.module == 'all' || github.event.inputs.module == matrix.module))
        uses: actions/upload-artifact@v4
        with:
          name: artifacts-${{ matrix.module }}
          path: artifacts/${{ matrix.module }}/
         

  deploy-pages:
    needs: run-modules
    if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download all artifact
        uses: actions/download-artifact@v4
        with:
          path: temp_dir/

      - name: Prepare public folder
        run: |
          mkdir -p public
          
          for d in temp_dir/artifacts-*; do
            if [ -d "$d" ]; then
              
              name=$(basename "$d" | sed 's/artifacts-//')
              mkdir -p "public/$name"
              cp -r "$d"/* "public/$name/"
            fi
          done
          
          
          echo "<html><body><h1>Project Reports</h1><ul>" > public/index.html
          for folder in public/*; do
            if [ -d "$folder" ]; then
              n=$(basename "$folder")
              echo "<li><a href='./$n/index.html'>$n Report</a></li>" >> public/index.html
            fi
          done
          echo "</ul></body></html>" >> public/index.html
          

      - name: Deploy to GitHub Pages
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: public/
          branch: gh-pages
