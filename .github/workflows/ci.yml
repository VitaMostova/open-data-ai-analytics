name: CI (modules)

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
  workflow_dispatch:
    inputs:
      module:
        description: "Оберіть модуль для запуску (або all)"
        required: true
        default: "all"
        type: choice
        options: [all, data_load, data_quality_analysis, data_research, visualization]

jobs:
  run-modules:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:

        module: [data_load, data_quality_analysis, data_research, visualization]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0


      - name: Check for changes in module
        id: changed-files
        uses: tj-actions/changed-files@v42
        with:
          files: src/${{ matrix.module }}.py

      - name: Set up Python

        if: |
          github.ref == 'refs/heads/main' ||
          steps.changed-files.outputs.any_changed == 'true' ||
          (github.event_name == 'workflow_dispatch' && (github.event.inputs.module == 'all' || github.event.inputs.module == matrix.module))
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: 'pip'

      - name: Install dependencies
        if: |
          github.ref == 'refs/heads/main' ||
          steps.changed-files.outputs.any_changed == 'true' ||
          (github.event_name == 'workflow_dispatch' && (github.event.inputs.module == 'all' || github.event.inputs.module == matrix.module))
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run module
        if: |
          github.ref == 'refs/heads/main' ||
          steps.changed-files.outputs.any_changed == 'true' ||
          (github.event_name == 'workflow_dispatch' && (github.event.inputs.module == 'all' || github.event.inputs.module == matrix.module))
        run: |
          mkdir -p artifacts/${{ matrix.module }}
          echo "Запуск модуля ${{ matrix.module }}..."
          python src/${{ matrix.module }}.py > artifacts/${{ matrix.module }}/run.log 2>&1
          cp -r reports/* artifacts/${{ matrix.module }}/ 2>/dev/null || true

      - name: Create HTML report for Pages
        if: |
          github.ref == 'refs/heads/main' ||
          steps.changed-files.outputs.any_changed == 'true' ||
          (github.event_name == 'workflow_dispatch' && (github.event.inputs.module == 'all' || github.event.inputs.module == matrix.module))
        run: |       
          echo "<html><body style='font-family:sans-serif;padding:20px;'>" > artifacts/${{ matrix.module }}/index.html
          echo "<h1>Results for ${{ matrix.module }}</h1>" >> artifacts/${{ matrix.module }}/index.html
          echo "<p>Build Date: $(date)</p><hr>" >> artifacts/${{ matrix.module }}/index.html
          echo "<h3>Files:</h3><ul>" >> artifacts/${{ matrix.module }}/index.html
          
          
          for f in artifacts/${{ matrix.module }}/*; do
            fname=$(basename $f)
            if [ "$fname" != "index.html" ]; then
              echo "<li><a href='$fname'>$fname</a></li>" >> artifacts/${{ matrix.module }}/index.html
            fi
          done
          echo "</ul><br><a href='../index.html'>← Back to Main Index</a></body></html>" >> artifacts/${{ matrix.module }}/index.html
          echo "</body></html>" >> artifacts/${{ matrix.module }}/index.html
      - name: Upload artifacts
        if: |
          github.ref == 'refs/heads/main' ||
          steps.changed-files.outputs.any_changed == 'true' ||
          (github.event_name == 'workflow_dispatch' && (github.event.inputs.module == 'all' || github.event.inputs.module == matrix.module))
        uses: actions/upload-artifact@v4
        with:
          name: artifacts-${{ matrix.module }}
          path: artifacts/${{ matrix.module }}/
         

  deploy-pages:
    needs: run-modules
    if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download all artifact
        uses: actions/download-artifact@v4
        with:
          path: temp_dir/

      - name: Prepare public folder
        run: |
          mkdir -p public
          for art_dir in temp_dir/artifacts-*; do
            if [ -d "$art_dir" ]; then
              mod_name=$(basename "$art_dir" | sed 's/artifacts-//')
              mkdir -p "public/$mod_name"
              cp -r "$art_dir"/* "public/$mod_name/"
            fi
          done

          
          echo "<html><body style='font-family:sans-serif;padding:40px;'>" > public/index.html
          echo "<h1> Project Reports Index</h1><hr><ul>" >> public/index.html
          
          for d in public/*; do
            if [ -d "$d" ]; then
              name=$(basename "$d")
              echo "<li style='margin:10px 0;'><a href='./$name/index.html' style='font-size:1.2em; font-weight:bold; text-transform:uppercase;'>$name Report</a></li>" >> public/index.html
            fi
          done
          
          echo "</ul><footer style='margin-top:50px;color:gray;'>Last Build: $(date)</footer></body></html>" >> public/index.html
          

      - name: Deploy to GitHub Pages
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: public/
          branch: gh-pages
